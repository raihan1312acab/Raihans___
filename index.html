<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Good Morning ☀️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:url("background.jpg") center center/cover no-repeat fixed;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.45);
}

.card{
    position:relative;
    z-index:2;
    width:100%;
    max-width:420px;
    padding:25px;
    border-radius:22px;
    background:rgba(20,20,20,.65);
    backdrop-filter:blur(12px);
    box-shadow:0 10px 35px rgba(0,0,0,.35);
    animation:fade 1s;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(25px);
}
to{
opacity:1;
transform:translateY(0);
}
}

h1{
text-align:center;
color:#fff;
margin-bottom:18px;
font-size:30px;
}

.foto{
width:100%;
border-radius:16px;
margin-bottom:20px;
}

#typing{
color:#f5f5f5;
font-size:16px;
line-height:1.9;
white-space:pre-wrap;
min-height:250px;
}

button{
width:100%;
margin-top:20px;
padding:14px;
border:none;
border-radius:30px;
background:#fff;
color:#111;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.03);
}

audio{
width:100%;
margin-top:18px;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="card">

<h1>Good Morning ☀️</h1>

<img src="foto.jpg" class="foto">

<p id="typing"></p>

<button onclick="alert('Semoga hari ini dimudahkan segala urusannya ya.')">
SEMANGATTT
</button>

<audio controls autoplay loop>
<source src="lagu.mp3" type="audio/mpeg">
</audio>

</div>

<script>

const text=`Good morning,Cantik.
baru bangun ya?
gimana tidurnya?nyenyak kan?
    
Nanti kerja gak?
kalo kerja jangan lupa sarapan dulu ya sebelum berangkat.
kalo mau berangakat hati hati di jalan.

 Jangan lupa sholat ya. Tetap jaga kesehatan, jangan sampai kecapekan. Terus kalau sempat, usahain mandinya jangan malam-malam ya.`;


let i=0;

function typing(){
if(i<text.length){
document.getElementById("typing").innerHTML+=text.charAt(i);
i++;
setTimeout(typing,35);
}
}

typing();

</script>

</body>
</html>
